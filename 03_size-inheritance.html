<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상속과 사이즈</title>
    <style>
        div {
             background-color: beige;
        }
        .parent {
            width: 400px;
            height: 200px;
            padding: 10px;
            margin: 10px;
            border: 1px solid black;
            background-color: gray;

            color: brown;
            font-size: 36px;
            text-align: right;
        }
        .child {
            width: 200px;
            height: 100px;
            padding: 10px;
            margin: 10px;
            border: 1px solid blue;
    </style>
</head>
<body>
    <div class="parent">
        부모
        <div class="child">
            자식
        </div>

    </div>
</body>
</html>
