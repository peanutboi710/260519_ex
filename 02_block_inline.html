<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block line</title>
    <style>
        div {
            background-color: salmon;
            width: 150px;
            height: 50px;
            margin: 15px;
            padding 15px;
        }
        span {
            display: inline;
            background-color: lime;
        }
        .block {
            display: block;
        }
        .inline {
            display: inline;
        }
        .inline-block {
            display: inline-block;
        }
        .container {
        width: 100%;
        height: 100%;
        background-color: transparent;
      }
    </style>
</head>
<body>
    <div>b1</div>
    <div>b2</div>
    <span>i1</span>
    <span>i2</span>
    <div class="inline">a1</div>
    <span class="block">a2</span>
    <div class="inline-block">a3</div>
    <div class="inline-block">a4</div>
    <img src="https://picsum.photos/100/50" />
    <img src="https://picsum.photos/100/50" />
    <div style="display: none">b1</div>
    <div>b2</div>
    <div style="visibility: hiddne">c1</div>
    <div>c2</div>
    <hr />
    <div class="container">
        <div class="container">header :</div>
        <div class="container">nav :</div>
    </div>

    <section>
        <header>윌리엄의 포폴</header>
        <nav>
            <button>포폴 1</button>
            <button>포폴 2</button>
            <button>포폴 3</button>
        </nav>
    </section>
</html>
